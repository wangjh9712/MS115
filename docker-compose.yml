version: '3.8'

services:
  backend:
    build: ./backend
    container_name: mediasync115-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      - NULLBR_APP_ID=Jy19cpz9p
      - NULLBR_API_KEY=rIxTz7XHDEHBcP9lGpeVAgs0I7Evg6wc
      - PAN115_COOKIE=${PAN115_COOKIE:-}
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: mediasync115-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
